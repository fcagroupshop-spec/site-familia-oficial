<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamíliaConnect - O Painel da sua Família</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração de Importações (ES Modules) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"
      }
    }
    </script>
    
    <!-- Compilador Babel para o browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuração PWA para instalar como App nativo -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1E293B">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Estilos globais para ocultar barras de scroll nativas mas manter funcionalidade */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
    
    <div id="root"></div>

    <!-- Código da Aplicação React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Home, DollarSign, CheckSquare, ShoppingCart, Plus, Calendar, RefreshCw, Trash2, Check, 
          MessageSquare, AlertCircle, LogOut, Users, ChevronRight, Activity, Stethoscope, Pill, 
          ArrowRight, Clock, Syringe, Timer, ChevronLeft, Info, History, PartyPopper, Camera, 
          TrendingUp, TrendingDown, Star, Heart, User, Lock, ShieldCheck, List, Share2, Wallet, Printer 
        } from 'lucide-react';

        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc, setDoc, query } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';

        // --- CONFIGURAÇÃO GLOBAL DO SEU PROJETO ---
        const firebaseConfig = {
          apiKey: "AIzaSyAaO7ku44gWyqwAHUC2lu_Z71MA0b-kegU",
          authDomain: "familiaconnect-452fc.firebaseapp.com",
          projectId: "familiaconnect-452fc",
          storageBucket: "familiaconnect-452fc.firebasestorage.app",
          messagingSenderId: "1015568222028",
          appId: "1:1015568222028:web:39c98e4bf5e6d26db471e9",
          measurementId: "G-PNP2TJ1X27"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'familia-connect-pro';

        const BRAND_LOGO = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
        
        // Fuso horário local corrigido para evitar bugs de viragem de dia
        const getLocalDate = (offsetDays = 0) => {
            const d = new Date();
            d.setDate(d.getDate() + offsetDays);
            return new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        };
        const today = getLocalDate(0);
        const tomorrow = getLocalDate(1);

        const formatDate = (dateString) => {
          if (!dateString) return '--/--';
          const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
          return new Date(dateString + 'T12:00:00').toLocaleDateString('pt-PT', options); 
        };

        // --- FUNÇÃO PARA CONVERTER VALORES (Vírgulas para Pontos) ---
        const parseValor = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return val;
            let str = val.toString().replace(',', '.');
            return parseFloat(str) || 0;
        };

        const SummaryCard = ({ title, sub, icon, color, onClick }) => (
            <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 cursor-pointer hover:shadow-md transition-all active:scale-95 text-slate-800" onClick={onClick}>
                <div className={`w-10 h-10 ${color} rounded-2xl flex items-center justify-center shadow-inner`}>{icon}</div>
                <div className="text-left"><p className="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">{title}</p><p className="font-bold text-slate-800 text-[11px] leading-tight">{sub}</p></div>
            </div>
        );

        const AlertCard = ({ type, icon, title, sub, onClick, onShare }) => {
            const c = { 
                danger: "bg-red-600 text-white border-b-4 border-red-900", 
                warning: "bg-amber-500 text-white border-b-4 border-amber-700",
                blue: "bg-blue-600 text-white border-b-4 border-blue-900",
                indigo: "bg-indigo-600 text-white border-b-4 border-indigo-900",
                cyan: "bg-cyan-600 text-white border-b-4 border-cyan-900",
                rose: "bg-rose-500 text-white border-b-4 border-rose-800"
            };
            return (
                <div className={`${c[type] || c.danger} p-6 rounded-[2.5rem] shadow-xl flex items-center justify-between transition-all text-left animate-in zoom-in duration-300`}>
                    <div className="flex-1 cursor-pointer active:scale-[0.98]" onClick={onClick}>
                        <div className="flex items-center gap-2 mb-1 opacity-80"><span className="scale-75">{icon}</span><p className="text-[9px] font-black uppercase tracking-widest leading-none">{title}</p></div>
                        <p className="font-black text-lg leading-tight pr-2">{sub}</p>
                    </div>
                    {onShare ? (
                        <button onClick={(e) => { e.stopPropagation(); onShare(); }} className="p-3 ml-2 bg-white/20 rounded-full hover:bg-white/30 transition-colors active:scale-90" title="Partilhar no WhatsApp">
                            <Share2 size={18} />
                        </button>
                    ) : (
                        <ChevronRight size={20} className="opacity-40 cursor-pointer" onClick={onClick} />
                    )}
                </div>
            );
        };

        const NavBtn = ({ icon, active, onClick, color }) => (
          <button onClick={onClick} className={`relative p-4 transition-all duration-300 ${active ? '-translate-y-2' : 'text-slate-300'}`}>
            <div className={`transition-all ${active ? `${color} scale-125` : ''}`}>{icon}</div>
            {active && <div className={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full ${color.replace('text', 'bg')} animate-pulse`}></div>}
          </button>
        );

        const Dashboard = ({ 
            familyName, familyLogo, localNote, setLocalNote, user, familyId, setActiveTab, 
            finances, tasks, medications, groceries, events, vaccines, healthRecords, updateFamilyLogo 
        }) => {
            const pendingExpenses = finances.filter(f => (f.type === 'expense' || f.type === 'savings') && !f.paid);
            const overdueBills = pendingExpenses.filter(f => f.date < today);
            const todayBills = pendingExpenses.filter(f => f.date === today);
            const tomorrowBills = pendingExpenses.filter(f => f.date === tomorrow);

            const overdueTasks = tasks.filter(t => !t.completed && t.date < today);
            const todayTasks = tasks.filter(t => !t.completed && t.date === today);
            const tomorrowTasks = tasks.filter(t => !t.completed && t.date === tomorrow);

            const urgentVac = vaccines
                .filter(v => v.nextDoseDate)
                .sort((a,b) => a.nextDoseDate.localeCompare(b.nextDoseDate))[0];
            
            const getDoseSchedule = (startTime, interval) => {
                if (!startTime) return [];
                const int = parseInt(interval);
                const [startH, startM] = startTime.split(':').map(Number);
                const doses = [];
                for (let i = 0; i < 24; i += int) {
                  const h = (startH + i) % 24;
                  doses.push(`${h.toString().padStart(2, '0')}:${startM.toString().padStart(2, '0')}`);
                }
                return doses.sort();
            };

            const nextMedDose = useMemo(() => {
                const active = medications.filter(m => today >= m.startDate && (today <= m.endDate || !m.endDate));
                if (!active.length) return null;
                const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
                let closest = null; let minDiff = Infinity;
                active.forEach(m => {
                    getDoseSchedule(m.startTime || "08:00", m.interval).forEach(time => {
                        const [h, min] = time.split(':').map(Number);
                        let diff = (h * 60 + min) - nowMin;
                        if (diff < 0) diff += 1440;
                        if (diff < minDiff) { minDiff = diff; closest = { ...m, nextTime: time }; }
                    });
                });
                return closest;
            }, [medications]);

            const nextAppointment = healthRecords.filter(r => r.date >= today).sort((a,b) => a.date.localeCompare(b.date))[0];
            const nextEvent = events.filter(ev => ev.date >= today).sort((a,b) => a.date.localeCompare(b.date))[0];
            
            // Verifica se há algum lembrete a mostrar
            const hasAlerts = overdueBills[0] || todayBills[0] || tomorrowBills[0] || overdueTasks[0] || todayTasks[0] || tomorrowTasks[0] || nextMedDose || urgentVac || nextAppointment || nextEvent;
            
            const logoInputRef = useRef(null);

            const handleShareWhatsApp = () => {
                const text = `Venha participar da nossa família no FamíliaConnect! 🏠✨\n\nAceda a: https://www.familiaconnect.com.br\nID da Família: *${familyId}*\n\nPeça a senha a quem lhe enviou este convite para manter a segurança!`;
                const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            };

            const shareItemToWhatsApp = (prefix, itemDetails) => {
                const text = `${prefix}\n\n${itemDetails}\n\n_Enviado via FamíliaConnect_ 🏠`;
                const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            };

            return (
              <div className="space-y-6 pb-24 text-left duration-500">
                <header className="flex justify-between items-center py-6 px-2 print:hidden">
                  <div className="flex items-center gap-5">
                    <div className="relative group">
                      <div 
                        onClick={() => logoInputRef.current?.click()}
                        className="w-16 h-16 bg-slate-200 rounded-full shadow-2xl overflow-hidden border-4 border-white ring-4 ring-indigo-50 cursor-pointer active:scale-95 transition-all"
                      >
                          <img src={familyLogo || BRAND_LOGO} alt="Perfil" className="w-full h-full object-cover" />
                          <div className="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <Camera className="text-white" size={16} />
                          </div>
                      </div>
                      <button 
                        onClick={() => logoInputRef.current?.click()}
                        className="absolute -bottom-1 -right-1 bg-indigo-600 text-white p-1.5 rounded-full border-2 border-white shadow-lg z-10 active:scale-110 transition-transform"
                      >
                        <Camera size={10}/>
                      </button>
                      <input type="file" ref={logoInputRef} className="hidden" accept="image/*" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => updateFamilyLogo(reader.result); reader.readAsDataURL(file); } }} />
                    </div>
                    <div className="flex flex-col justify-center">
                      <h1 className="text-2xl font-black text-slate-800 tracking-tighter leading-none mb-1">Família {familyName}</h1>
                      <div className="flex items-center gap-2">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Painel de controle</p>
                        <span className="text-[9px] bg-indigo-50 text-indigo-500 px-1.5 py-0.5 rounded-md font-black border border-indigo-100">ID: {familyId}</span>
                      </div>
                    </div>
                  </div>
                  <div className="flex gap-2">
                      <button onClick={handleShareWhatsApp} title="Convidar via WhatsApp" className="p-3.5 bg-white rounded-2xl shadow-md text-emerald-500 hover:text-emerald-600 hover:shadow-lg transition-all active:scale-90"><Share2 size={22}/></button>
                      <button onClick={() => { localStorage.clear(); window.location.reload(); }} title="Sair" className="p-3.5 bg-white rounded-2xl shadow-md text-slate-400 hover:text-red-500 hover:shadow-lg transition-all active:scale-90"><LogOut size={22}/></button>
                  </div>
                </header>

                <div className="bg-yellow-100 p-6 rounded-[2.5rem] border-b-4 border-yellow-200 shadow-sm print:hidden">
                    <div className="flex items-start gap-3">
                        <MessageSquare className="text-yellow-600 mt-1" size={20} />
                        <div className="flex-1">
                            <p className="text-[10px] font-black text-yellow-700 uppercase mb-1 tracking-widest leading-none">Mural da Família (Sincronizado)</p>
                            <textarea value={localNote} onChange={(e) => { setLocalNote(e.target.value); if (user) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_families', familyId), { stickyNote: e.target.value }).catch(err => console.error(err)); }} className="bg-transparent w-full font-bold text-yellow-900 resize-none outline-none h-20 text-lg leading-tight mt-1" placeholder="Deixe um recado..."/>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-4 print:hidden">
                    <SummaryCard title="Finanças" sub={`${pendingExpenses.length} pendentes`} icon={<DollarSign/>} color={overdueBills.length ? "bg-red-50 text-red-600" : "bg-emerald-50 text-emerald-600"} onClick={()=>setActiveTab('finance')}/>
                    <SummaryCard title="Tarefas" sub={`${tasks.filter(t=>!t.completed).length} abertas`} icon={<CheckSquare/>} color={overdueTasks.length ? "bg-red-50 text-red-600" : "bg-indigo-50 text-indigo-600"} onClick={()=>setActiveTab('tasks')}/>
                    <SummaryCard title="Saúde" sub={`${medications.length} remédios`} icon={<Activity/>} color="bg-cyan-50 text-cyan-600" onClick={()=>setActiveTab('health')}/>
                    <SummaryCard title="Mercado" sub={`${groceries.filter(g=>!g.bought).length} itens`} icon={<ShoppingCart/>} color="bg-amber-50 text-amber-500" onClick={()=>setActiveTab('groceries')}/>
                    <SummaryCard title="Lazer" sub={`${events.filter(e=>e.date >= today).length} eventos`} icon={<PartyPopper/>} color="bg-rose-50 text-rose-500" onClick={()=>setActiveTab('leisure')}/>
                </div>

                <div className="space-y-4 mb-8 print:hidden">
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 mt-4">Lembretes Importantes</h3>
                    
                    {!hasAlerts ? (
                        <div className="text-center p-8 bg-white rounded-[2rem] border border-slate-100 shadow-sm animate-in fade-in">
                            <Check size={32} className="mx-auto mb-2 text-emerald-400 opacity-80"/>
                            <p className="font-bold text-sm text-slate-600">Tudo em dia!</p>
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mt-1">Nenhum lembrete para hoje</p>
                        </div>
                    ) : (
                        <>
                            {overdueBills[0] && <AlertCard type="danger" icon={<AlertCircle/>} title={overdueBills[0].type === 'savings' ? "Aporte Atrasado" : "Gasto Vencido"} sub={`${overdueBills[0].title} • R$ ${parseValor(overdueBills[0].value).toFixed(2)}`} onClick={()=>setActiveTab('finance')} onShare={() => shareItemToWhatsApp('🚨 *ATRASADO*', `*${overdueBills[0].title}*\nValor: R$ ${parseValor(overdueBills[0].value).toFixed(2)}\nVencimento original: ${formatDate(overdueBills[0].date)}\nQuem paga: ${overdueBills[0].assignee || 'A definir'}`)}/>}
                            {todayBills[0] && <AlertCard type="danger" icon={<DollarSign/>} title={todayBills[0].type === 'savings' ? "Investir Hoje" : "Vence Hoje"} sub={`${todayBills[0].title} • R$ ${parseValor(todayBills[0].value).toFixed(2)}`} onClick={()=>setActiveTab('finance')} onShare={() => shareItemToWhatsApp('💸 *VENCE HOJE*', `*${todayBills[0].title}*\nValor: R$ ${parseValor(todayBills[0].value).toFixed(2)}\nQuem paga: ${todayBills[0].assignee || 'A definir'}`)}/>}
                            {tomorrowBills[0] && <AlertCard type="warning" icon={<Clock/>} title={tomorrowBills[0].type === 'savings' ? "Investir Amanhã" : "Vence Amanhã"} sub={`${tomorrowBills[0].title} • R$ ${parseValor(tomorrowBills[0].value).toFixed(2)}`} onClick={()=>setActiveTab('finance')} onShare={() => shareItemToWhatsApp('⏰ *VENCE AMANHÃ*', `*${tomorrowBills[0].title}*\nValor: R$ ${parseValor(tomorrowBills[0].value).toFixed(2)}\nQuem paga: ${tomorrowBills[0].assignee || 'A definir'}`)}/>}
                            
                            {overdueTasks[0] && <AlertCard type="danger" icon={<AlertCircle/>} title="Tarefa Vencida" sub={`${overdueTasks[0].title}`} onClick={()=>setActiveTab('tasks')} onShare={() => shareItemToWhatsApp('🚨 *TAREFA ATRASADA*', `*${overdueTasks[0].title}*\nResponsável: ${overdueTasks[0].assignee || 'Todos'}\nEra para: ${formatDate(overdueTasks[0].date)}`)}/>}
                            {todayTasks[0] && <AlertCard type="danger" icon={<CheckSquare/>} title="Tarefa para Hoje" sub={`${todayTasks[0].title} às ${todayTasks[0].time || '--:--'}`} onClick={()=>setActiveTab('tasks')} onShare={() => shareItemToWhatsApp('✅ *TAREFA DE HOJE*', `*${todayTasks[0].title}*\nResponsável: ${todayTasks[0].assignee || 'Todos'}\nHorário: ${todayTasks[0].time || '--:--'}`)}/>}
                            {tomorrowTasks[0] && <AlertCard type="warning" icon={<Clock/>} title="Tarefa para Amanhã" sub={`${tomorrowTasks[0].title}`} onClick={()=>setActiveTab('tasks')} onShare={() => shareItemToWhatsApp('⏰ *TAREFA PARA AMANHÃ*', `*${tomorrowTasks[0].title}*\nResponsável: ${tomorrowTasks[0].assignee || 'Todos'}\nHorário: ${tomorrowTasks[0].time || '--:--'}`)}/>}

                            {nextMedDose && <AlertCard type="blue" icon={<Pill/>} title={`Dose às ${nextMedDose.nextTime}`} sub={`${nextMedDose.name} (${nextMedDose.patient})`} onClick={()=>setActiveTab('health')} onShare={() => shareItemToWhatsApp('💊 *HORA DO REMÉDIO*', `*${nextMedDose.name}*\nPaciente: ${nextMedDose.patient}\nHorário da dose: ${nextMedDose.nextTime}`)}/>}
                            {urgentVac && <AlertCard type="indigo" icon={<Syringe/>} title="Próxima Vacina" sub={`${urgentVac.name} • ${formatDate(urgentVac.nextDoseDate)}`} onClick={()=>setActiveTab('health')} onShare={() => shareItemToWhatsApp('💉 *LEMBRETE DE VACINA*', `*${urgentVac.name}*\nPaciente: ${urgentVac.patient}\nData: ${formatDate(urgentVac.nextDoseDate)}`)}/>}
                            {nextAppointment && <AlertCard type="cyan" icon={<Stethoscope/>} title="Agendamento" sub={`${nextAppointment.title} • ${formatDate(nextAppointment.date)}`} onClick={()=>setActiveTab('health')} onShare={() => shareItemToWhatsApp('🩺 *CONSULTA/EXAME*', `*${nextAppointment.title}*\nPaciente: ${nextAppointment.patient}\nData: ${formatDate(nextAppointment.date)} às ${nextAppointment.time}\nLocal: ${nextAppointment.location || 'A definir'}`)}/>}
                            {nextEvent && <AlertCard type="rose" icon={<PartyPopper/>} title="Próximo Evento" sub={`${nextEvent.title} • ${formatDate(nextEvent.date)} às ${nextEvent.time || '--:--'}`} onClick={()=>setActiveTab('leisure')} onShare={() => shareItemToWhatsApp('🎉 *NOSSO PRÓXIMO EVENTO*', `*${nextEvent.title}*\nData: ${formatDate(nextEvent.date)} às ${nextEvent.time}\nLocal: ${nextEvent.location || 'A definir'}`)}/>}
                        </>
                    )}
                </div>
              </div>
            );
        };

        const FinanceModule = ({ finances, recurringFinances, familyId, formatDate, today, appId, showStatus }) => {
            const [ni, setNi] = useState({ title: '', value: '', date: today, type: 'expense', frequency: 'once', installments: 2, assignee: '' });
            
            const handlePrint = () => {
                window.print();
            };

            const saveFinance = async ()=>{
                if(!ni.title || !ni.value) return;
                
                let extraData = {};
                if (ni.frequency === 'monthly' || ni.frequency === 'weekly' || ni.frequency === 'monthly_variable') {
                    const alreadyExists = recurringFinances.some(r => r.title.toLowerCase() === ni.title.toLowerCase());
                    if (!alreadyExists) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_recurring'), { 
                            title: ni.title, value: parseValor(ni.value), type: ni.type, frequency: ni.frequency, assignee: ni.assignee, familyId 
                        });
                    }
                    extraData = { isRecurring: true, frequency: ni.frequency };
                } else if (ni.frequency === 'installments') {
                    extraData = { currentInstallment: 1, totalInstallments: Number(ni.installments) };
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_finances'), { 
                    title: ni.title, value: parseValor(ni.value), type: ni.type, date: ni.date, assignee: ni.assignee, familyId, paid: false, createdAt: Date.now(), ...extraData
                });
                
                setNi({ title: '', value: '', date: ni.date, type: ni.type, frequency: 'once', installments: 2, assignee: '' });
                showStatus("Salvo!");
            };

            const addFromRecurring = async (rec) => {
                const d = new Date();
                if (rec.frequency === 'weekly') d.setDate(d.getDate() + 7);
                else { const originalDay = d.getDate(); d.setMonth(d.getMonth() + 1); if (d.getDate() !== originalDay) d.setDate(0); }
                const dateStr = d.toISOString().split('T')[0];

                if (rec.frequency === 'monthly_variable') {
                    setNi({ title: rec.title, value: '', date: dateStr, type: rec.type, frequency: 'monthly_variable', installments: 2, assignee: rec.assignee || '' });
                    showStatus("Preencha o valor da fatura deste mês e clique em Salvar!");
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_finances'), { 
                    title: rec.title, value: parseValor(rec.value), type: rec.type, date: dateStr, assignee: rec.assignee || '', familyId, paid: false, isRecurring: true, frequency: rec.frequency || 'monthly', createdAt: Date.now() 
                });
                showStatus(`Lançado para ${formatDate(dateStr)}: ${rec.title}`);
            };

            const togglePaid = async (f) => {
                const newPaidStatus = !f.paid;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_finances', f.id), { paid: newPaidStatus });

                if (newPaidStatus && !f.nextCreated) {
                    let shouldCreateNext = false; let nextDateObj = new Date(f.date + 'T12:00:00'); let nextInstallment = null;
                    if (f.frequency !== 'monthly_variable' && (f.isRecurring || f.frequency === 'monthly' || f.frequency === 'weekly')) {
                        shouldCreateNext = true;
                        if (f.frequency === 'weekly') nextDateObj.setDate(nextDateObj.getDate() + 7);
                        else nextDateObj.setMonth(nextDateObj.getMonth() + 1);
                    } else if (f.totalInstallments && f.currentInstallment < f.totalInstallments) {
                        shouldCreateNext = true; nextDateObj.setMonth(nextDateObj.getMonth() + 1); nextInstallment = f.currentInstallment + 1;
                    }

                    if (shouldCreateNext) {
                        const nextDateStr = nextDateObj.toISOString().split('T')[0];
                        let nextData = { title: f.title, value: parseValor(f.value), type: f.type, date: nextDateStr, assignee: f.assignee || '', familyId, paid: false, createdAt: Date.now() };
                        if (nextInstallment) { nextData.currentInstallment = nextInstallment; nextData.totalInstallments = f.totalInstallments; } 
                        else { nextData.isRecurring = true; nextData.frequency = f.frequency || 'monthly'; }

                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_finances'), nextData);
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_finances', f.id), { nextCreated: true });
                        if (nextInstallment) showStatus(`Parcela ${nextInstallment}/${f.totalInstallments} gerada!`);
                        else showStatus("Próximo lançamento gerado automaticamente!");
                    }
                }
            };

            const deleteRecurring = async (id) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_recurring', id)); showStatus("Removido da rotina"); };

            const totalIncome = finances.filter(f => f.type === 'income').reduce((acc, curr) => acc + parseValor(curr.value), 0);
            const totalExpenses = finances.filter(f => f.type === 'expense').reduce((acc, curr) => acc + parseValor(curr.value), 0);
            const totalSavings = finances.filter(f => f.type === 'savings').reduce((acc, curr) => acc + parseValor(curr.value), 0);
            const balance = totalIncome - totalExpenses - totalSavings;

            return (
                <div className="space-y-6 text-left text-slate-800 duration-300 print:space-y-4">
                    <div className="bg-emerald-600 p-6 rounded-[2.5rem] text-white shadow-xl text-center relative print:bg-transparent print:text-slate-800 print:shadow-none print:p-0 print:border-b print:border-slate-200 print:rounded-none print:pb-6">
                        <button onClick={handlePrint} className="absolute top-6 right-6 p-2 bg-white/20 rounded-full hover:bg-white/30 transition-colors print:hidden" title="Imprimir Relatório">
                            <Printer size={18} />
                        </button>
                        <h2 className="text-2xl font-black mb-1">Gestão Financeira</h2>
                        <p className="text-emerald-100 text-xs font-bold uppercase opacity-80 print:text-slate-500">Controle a economia da família</p>
                        <div className="grid grid-cols-2 gap-2 mt-4 bg-black/10 p-3 rounded-2xl print:bg-slate-50 print:border print:border-slate-200">
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Renda da Família</p><p className="font-bold text-sm text-emerald-300 print:text-emerald-600">R$ {totalIncome.toFixed(2)}</p></div>
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Despesas</p><p className="font-bold text-sm text-red-300 print:text-red-600">R$ {totalExpenses.toFixed(2)}</p></div>
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Guardado / Invest.</p><p className="font-bold text-sm text-blue-300 print:text-blue-600">R$ {totalSavings.toFixed(2)}</p></div>
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Saldo Livre</p><p className={`font-black text-sm ${balance >= 0 ? 'text-white print:text-slate-800' : 'text-red-300 print:text-red-600'}`}>R$ {balance.toFixed(2)}</p></div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 print:hidden">
                        <div className="flex gap-2 mb-4 bg-slate-50 p-1.5 rounded-2xl">
                            <button onClick={() => setNi({...ni, type: 'expense', frequency: ni.frequency === 'installments' ? 'once' : ni.frequency})} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all flex items-center justify-center gap-1 ${ni.type === 'expense' ? 'bg-red-500 text-white shadow-md' : 'text-slate-400'}`}><TrendingDown size={14}/> Despesa</button>
                            <button onClick={() => setNi({...ni, type: 'income', frequency: ni.frequency === 'installments' ? 'once' : ni.frequency})} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all flex items-center justify-center gap-1 ${ni.type === 'income' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-400'}`}><TrendingUp size={14}/> Receita</button>
                            <button onClick={() => setNi({...ni, type: 'savings', frequency: ni.frequency === 'installments' ? 'once' : ni.frequency})} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all flex items-center justify-center gap-1 ${ni.type === 'savings' ? 'bg-blue-500 text-white shadow-md' : 'text-slate-400'}`}><Wallet size={14}/> Guardar</button>
                        </div>
                        
                        <input placeholder="Descrição da movimentação" className="bg-slate-50 p-4 rounded-2xl w-full border-none mb-3 font-bold outline-none" value={ni.title} onChange={e=>setNi({...ni, title: e.target.value})}/>
                        
                        <div className="mb-3">
                            <input 
                                placeholder={ni.type === 'expense' ? "Quem paga? (Ex: João, Cartão Maria)" : ni.type === 'income' ? "De quem/Fonte? (Ex: Salário Ana)" : "Quem poupou / Fonte? (Ex: Família, Pai, Mãe)"} 
                                className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none text-sm text-slate-600 placeholder:text-slate-400" 
                                value={ni.assignee} 
                                onChange={e=>setNi({...ni, assignee: e.target.value})}
                            />
                        </div>

                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <input type="number" step="0.01" placeholder="Valor R$" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={ni.value} onChange={e=>setNi({...ni, value: e.target.value})}/>
                            <input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none" value={ni.date} onChange={e=>setNi({...ni, date: e.target.value})}/>
                        </div>
                        <div className="flex gap-2 mb-4 px-2 items-center bg-slate-50/50 p-2 rounded-xl">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Repetição:</label>
                            <select className="bg-white px-3 py-2 rounded-xl border border-slate-100 font-bold text-slate-600 outline-none text-xs flex-1 shadow-sm" value={ni.frequency} onChange={e=>setNi({...ni, frequency: e.target.value})}>
                                <option value="once">Única</option><option value="weekly">Semanal</option><option value="monthly">Mensal Fixa</option><option value="monthly_variable">Mensal Variável</option>{ni.type === 'expense' && <option value="installments">Parcelada</option>}
                            </select>
                            {ni.frequency === 'installments' && <input type="number" min="2" max="12" className="bg-white px-3 py-2 rounded-xl w-16 border border-slate-100 font-bold outline-none text-xs text-center shadow-sm" value={ni.installments} onChange={e=>setNi({...ni, installments: e.target.value})} placeholder="Qtd"/>}
                        </div>
                        <button onClick={saveFinance} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">Salvar</button>
                    </div>

                    {recurringFinances.length > 0 && (
                        <div className="space-y-3 print:hidden">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 flex items-center gap-2"><Star size={12} className="text-amber-400 fill-amber-400"/> Contas de Rotina</h3>
                            <div className="flex overflow-x-auto gap-3 pb-2 px-1 scrollbar-hide">
                                {recurringFinances.map(rec => (
                                    <div key={rec.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 min-w-[140px] relative group flex flex-col justify-between">
                                        <button onClick={() => deleteRecurring(rec.id)} className="absolute -top-1 -right-1 bg-white shadow-md rounded-full p-1 text-slate-200 hover:text-red-500 z-10"><Trash2 size={10}/></button>
                                        <div className="cursor-pointer flex-1" onClick={() => addFromRecurring(rec)}>
                                            <p className="font-bold text-slate-700 text-xs truncate mb-1 pr-3">{rec.title}</p>
                                            <div className="flex items-center justify-between mb-1">
                                                <p className="text-[10px] font-black text-slate-400">{rec.frequency === 'monthly_variable' ? 'Valor a definir' : `R$ ${parseValor(rec.value).toFixed(2)}`}</p>
                                                <div className={`w-2 h-2 rounded-full ${rec.type === 'expense' ? 'bg-red-400' : rec.type === 'savings' ? 'bg-blue-400' : 'bg-emerald-400'}`}></div>
                                            </div>
                                            {rec.assignee && <p className="text-[9px] font-bold text-slate-400 truncate mb-1">{rec.assignee}</p>}
                                            <span className="text-[8px] font-black text-amber-500 uppercase bg-amber-50 px-1 py-0.5 rounded inline-block">{rec.frequency === 'weekly' ? 'Semanal' : rec.frequency === 'monthly_variable' ? 'Variável' : 'Mensal'}</span>
                                            <p className="text-[8px] font-black text-indigo-500 uppercase mt-2 opacity-60">Lançar próximo</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="space-y-3 print:mt-6">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 print:text-black">Lançamentos</h3>
                        <div className="print:space-y-2">
                            {finances.sort((a,b) => b.createdAt - a.createdAt).map(f => {
                                let badge = null;
                                if (f.totalInstallments) {
                                    badge = <span className="text-[9px] font-black text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded uppercase shrink-0 print:border print:border-slate-300">{f.currentInstallment}/{f.totalInstallments}</span>;
                                } else if (f.isRecurring || f.frequency) {
                                    badge = <span className="text-[9px] font-black text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded uppercase flex items-center gap-1 shrink-0 print:border print:border-slate-300"><Star size={8} className="fill-amber-400 print:hidden"/> {f.frequency === 'weekly' ? 'Sem' : 'Men'}</span>;
                                }

                                return (
                                    <div key={f.id} className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-50 print:border-b print:border-slate-200 print:shadow-none print:rounded-none print:p-2">
                                        <div className="flex items-center gap-3 text-left min-w-0 pr-2">
                                            <button onClick={() => togglePaid(f)} className={`w-8 h-8 rounded-xl border-2 flex items-center justify-center transition-all shrink-0 print:hidden ${f.paid ? 'bg-slate-800 border-slate-800 text-white' : 'border-slate-100 text-transparent'}`}><Check size={18}/></button>
                                            
                                            {/* Versão impressa da checkbox */}
                                            <div className="hidden print:flex w-5 h-5 border-2 border-slate-400 rounded-md items-center justify-center mr-2">
                                                {f.paid && <Check size={14} className="text-slate-800"/>}
                                            </div>

                                            <div className="text-left min-w-0">
                                                <p className={`font-bold truncate print:text-black print:text-sm ${f.paid ? 'line-through text-slate-300 print:text-slate-500' : 'text-slate-800'}`}>{f.title}</p>
                                                <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase shrink-0 print:text-slate-500">{formatDate(f.date)}</p>
                                                    {f.assignee && <span className="text-[9px] font-black text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded uppercase truncate max-w-[80px] print:bg-transparent print:border print:border-slate-300">{f.assignee}</span>}
                                                    {badge}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 shrink-0">
                                            <span className={`font-black text-sm print:text-sm print:text-black ${f.type === 'income' ? 'text-emerald-500' : f.type === 'savings' ? 'text-blue-500' : 'text-slate-700'}`}>
                                                {f.type === 'income' ? '+' : f.type === 'savings' ? '↓' : '-'} R$ {parseValor(f.value).toFixed(2)}
                                            </span>
                                            <button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_finances', f.id))} className="text-slate-200 hover:text-red-500 transition-colors print:hidden"><Trash2 size={16}/></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const TaskModule = ({ tasks, recurringTasks, familyId, formatDate, today, appId, showStatus }) => {
            const [nt, setNt] = useState({ title: '', assignee: '', date: today, time: '12:00', frequency: 'once' });
            const freqLabels = { 'weekly': 'Semanal', 'weekly_1': 'Toda Segunda', 'weekly_2': 'Toda Terça', 'weekly_3': 'Toda Quarta', 'weekly_4': 'Toda Quinta', 'weekly_5': 'Toda Sexta', 'weekly_6': 'Todo Sábado', 'weekly_0': 'Todo Domingo', 'monthly': 'Mensal' };

            const saveTask = async ()=>{
                if(!nt.title || !nt.assignee) return;
                let finalDate = nt.date;
                if (nt.frequency.startsWith('weekly_')) {
                    const targetDay = parseInt(nt.frequency.split('_')[1]); let d = new Date(today + 'T12:00:00');
                    if (d.getDay() !== targetDay) { d.setDate(d.getDate() + 1); while(d.getDay() !== targetDay) { d.setDate(d.getDate() + 1); } }
                    finalDate = d.toISOString().split('T')[0];
                }

                if (nt.frequency !== 'once') {
                    const alreadyExists = recurringTasks.some(r => r.title.toLowerCase() === nt.title.toLowerCase());
                    if (!alreadyExists) await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_recurring_tasks'), { title: nt.title, assignee: nt.assignee, time: nt.time, frequency: nt.frequency, lastScheduledDate: finalDate, familyId });
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_tasks'), { title: nt.title, assignee: nt.assignee, date: finalDate, time: nt.time, frequency: nt.frequency, familyId, completed: false, createdAt: Date.now() });
                setNt({ title: '', assignee: '', date: today, time: '12:00', frequency: 'once' });
                showStatus("Salvo!");
            };

            const addFromRecurring = async (rec) => {
                let baseDate = rec.lastScheduledDate ? new Date(rec.lastScheduledDate + 'T12:00:00') : new Date();
                if (rec.frequency && rec.frequency.startsWith('weekly_')) {
                    const targetDay = parseInt(rec.frequency.split('_')[1]); baseDate.setDate(baseDate.getDate() + 1); while (baseDate.getDay() !== targetDay) baseDate.setDate(baseDate.getDate() + 1);
                } else if (rec.frequency === 'weekly') baseDate.setDate(baseDate.getDate() + 7);
                else { const originalDay = baseDate.getDate(); baseDate.setMonth(baseDate.getMonth() + 1); if (baseDate.getDate() !== originalDay) baseDate.setDate(0); }
                const dateStr = baseDate.toISOString().split('T')[0];

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_tasks'), { title: rec.title, assignee: rec.assignee, time: rec.time, date: dateStr, frequency: rec.frequency || 'monthly', familyId, completed: false, createdAt: Date.now() });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_recurring_tasks', rec.id), { lastScheduledDate: dateStr });
                showStatus(`Tarefa para ${formatDate(dateStr)}: ${rec.title}`);
            };

            const deleteRecurring = async (id) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_recurring_tasks', id)); showStatus("Removido da rotina"); };

            return (
                <div className="space-y-6 text-left text-slate-800 duration-300">
                    <div className="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-xl text-center"><h2 className="text-2xl font-black mb-1">Tarefas da Casa</h2><p className="text-indigo-100 text-xs font-bold uppercase opacity-80">Organize sua rotina</p></div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <input placeholder="O que precisa ser feito?" className="bg-slate-50 p-4 rounded-2xl w-full border-none mb-3 font-bold outline-none" value={nt.title} onChange={e=>setNt({...nt, title: e.target.value})}/>
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <input placeholder="Responsável" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nt.assignee} onChange={e=>setNt({...nt, assignee: e.target.value})}/>
                            {nt.frequency.startsWith('weekly_') ? <div className="bg-indigo-50 p-4 rounded-2xl w-full border-none flex items-center justify-center text-indigo-400 font-black text-[10px] uppercase tracking-widest text-center">Data Automática</div> : <input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none" value={nt.date} onChange={e=>setNt({...nt, date: e.target.value})}/>}
                        </div>
                        <div className="mb-4"><label className="text-[10px] font-black text-slate-400 ml-2">Horário de Execução</label><input type="time" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nt.time} onChange={e=>setNt({...nt, time: e.target.value})}/></div>
                        <div className="flex gap-2 mb-4 px-2 items-center bg-slate-50/50 p-2 rounded-xl">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Repetição:</label>
                            <select className="bg-white px-3 py-2 rounded-xl border border-slate-100 font-bold text-slate-600 outline-none text-xs flex-1 shadow-sm" value={nt.frequency} onChange={e=>setNt({...nt, frequency: e.target.value})}>
                                <option value="once">Única (Por data)</option><option value="weekly_1">Toda Segunda</option><option value="weekly_2">Toda Terça</option><option value="weekly_3">Toda Quarta</option><option value="weekly_4">Toda Quinta</option><option value="weekly_5">Toda Sexta</option><option value="weekly_6">Todo Sábado</option><option value="weekly_0">Todo Domingo</option><option value="monthly">Mensal (Rotina)</option>
                            </select>
                        </div>
                        <button onClick={saveTask} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">Salvar</button>
                    </div>

                    {recurringTasks.length > 0 && (
                        <div className="space-y-3">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 flex items-center gap-2"><Star size={12} className="text-amber-400 fill-amber-400"/> Tarefas de Rotina</h3>
                            <div className="flex overflow-x-auto gap-3 pb-2 px-1 scrollbar-hide">
                                {recurringTasks.map(rec => (
                                    <div key={rec.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 min-w-[140px] relative group flex flex-col justify-between">
                                        <button onClick={() => deleteRecurring(rec.id)} className="absolute -top-1 -right-1 bg-white shadow-md rounded-full p-1 text-slate-200 hover:text-red-500 z-10"><Trash2 size={10}/></button>
                                        <div className="cursor-pointer flex-1" onClick={() => addFromRecurring(rec)}>
                                            <p className="font-bold text-slate-700 text-xs truncate mb-1">{rec.title}</p>
                                            <div className="flex items-center justify-between"><p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{rec.assignee}</p><p className="text-[10px] font-black text-indigo-500">{rec.time}</p></div>
                                            <span className="text-[8px] font-black text-indigo-500 uppercase bg-indigo-50 px-1 py-0.5 rounded inline-block mt-2 w-fit">{freqLabels[rec.frequency] || 'Rotina'}</span>
                                            <p className="text-[8px] font-black text-indigo-500 uppercase mt-2 opacity-60">Lançar para próxima</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="space-y-3">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Minha Agenda</h3>
                        {tasks.sort((a,b) => b.createdAt - a.createdAt).map(t => (
                            <div key={t.id} className={`p-4 rounded-2xl flex items-center gap-4 transition-all ${t.completed ? 'bg-slate-50 opacity-60' : 'bg-white shadow-sm border border-slate-50'}`}>
                                <button onClick={()=>updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_tasks', t.id), { completed: !t.completed })} className={`w-8 h-8 rounded-xl border-2 flex items-center justify-center transition-all ${t.completed ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-100 text-transparent'}`}><Check size={18}/></button>
                                <div className="flex-1 text-left">
                                    <p className={`font-bold ${t.completed ? 'line-through text-slate-400' : 'text-slate-800'}`}>{t.title}</p>
                                    <p className="text-[10px] font-black uppercase text-indigo-500 tracking-widest leading-none mb-1">{t.assignee}</p>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">{formatDate(t.date)} às {t.time || '--:--'}</p>
                                </div>
                                <button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_tasks', t.id))} className="text-slate-200 hover:text-red-500"><Trash2 size={16}/></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HealthModule = ({ medications, vaccines, healthRecords, familyId, today, appId, formatDate, showStatus }) => {
            const [view, setView] = useState('geral');
            const [nMed, setNMed] = useState({ name: '', patient: '', dosage: '', interval: '8', startDate: today, endDate: '', startTime: '08:00' });
            const [nVac, setNVac] = useState({ name: '', patient: '', date: today, nextDoseDate: '' });
            const [nApp, setNApp] = useState({ title: '', patient: '', date: today, time: '10:00', location: '' });

            const saveMed = async () => { if (!nMed.name || !nMed.patient) return; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_meds'), { ...nMed, familyId, createdAt: Date.now() }); setNMed({ name: '', patient: '', dosage: '', interval: '8', startDate: today, endDate: '', startTime: '08:00' }); showStatus("Salvo!"); };
            const saveVac = async () => { if (!nVac.name || !nVac.patient) return; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_vaccines'), { ...nVac, familyId, createdAt: Date.now() }); setNVac({ name: '', patient: '', date: today, nextDoseDate: '' }); showStatus("Salvo!"); };
            const saveApp = async () => { if (!nApp.title || !nApp.patient) return; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_health'), { ...nApp, familyId, createdAt: Date.now() }); setNApp({ title: '', patient: '', date: today, time: '10:00', location: '' }); showStatus("Salvo!"); };

            const getDoseSchedule = (startTime, interval) => { if (!startTime) return []; const int = parseInt(interval); const [startH, startM] = startTime.split(':').map(Number); const doses = []; for (let i = 0; i < 24; i += int) { const h = (startH + i) % 24; doses.push(`${h.toString().padStart(2, '0')}:${startM.toString().padStart(2, '0')}`); } return doses.sort(); };

            const getUpcomingEvents = () => {
                const todayDoses = []; const activeMeds = medications.filter(m => today >= m.startDate && (today <= m.endDate || !m.endDate));
                activeMeds.forEach(m => { getDoseSchedule(m.startTime, m.interval).forEach(t => { todayDoses.push({ id: m.id + t, type: 'med', title: m.name, sub: `${m.dosage || 'Dose'} (${m.patient})`, time: t, date: today, sortDate: `${today}T${t}:00` }); }); });
                const apps = healthRecords.filter(r => r.date >= today).map(r => ({ id: r.id, type: 'app', title: r.title, sub: `${r.location || 'Local a definir'} (${r.patient})`, time: r.time, date: r.date, sortDate: `${r.date}T${r.time || '00:00'}:00` }));
                const vacs = vaccines.filter(v => v.nextDoseDate && v.nextDoseDate >= today).map(v => ({ id: v.id, type: 'vac', title: `Vacina: ${v.name}`, sub: `Reforço (${v.patient})`, time: '08:00', date: v.nextDoseDate, sortDate: `${v.nextDoseDate}T08:00:00` }));
                return [...todayDoses, ...apps, ...vacs].sort((a,b) => a.sortDate.localeCompare(b.sortDate));
            };

            const upcomingItems = getUpcomingEvents();

            return (
                <div className="space-y-6 pb-24 text-left text-slate-800 duration-300">
                    <div className="bg-cyan-600 p-6 rounded-[2.5rem] text-white shadow-xl text-center">
                        <h2 className="text-2xl font-black mb-4">Saúde Familiar</h2>
                        <div className="flex justify-center w-full">
                             <div className="flex gap-1.5 p-1 bg-black/10 rounded-2xl overflow-x-auto scrollbar-hide max-w-full">
                                <button onClick={()=>setView('geral')} className={`px-4 py-1 rounded-xl text-[09px] font-black uppercase transition-all whitespace-nowrap ${view==='geral' ? 'bg-white text-cyan-600 shadow-md' : 'text-white/70'}`}>Geral</button>
                                <button onClick={()=>setView('meds')} className={`px-4 py-1 rounded-xl text-[09px] font-black uppercase transition-all whitespace-nowrap ${view==='meds' ? 'bg-white text-cyan-600 shadow-md' : 'text-white/70'}`}>Remédios</button>
                                <button onClick={()=>setView('vacs')} className={`px-4 py-1 rounded-xl text-[09px] font-black uppercase transition-all whitespace-nowrap ${view==='vacs' ? 'bg-white text-cyan-600 shadow-md' : 'text-white/70'}`}>Vacinas</button>
                                <button onClick={()=>setView('agenda')} className={`px-4 py-1 rounded-xl text-[09px] font-black uppercase transition-all whitespace-nowrap ${view==='agenda' ? 'bg-white text-cyan-600 shadow-md' : 'text-white/70'}`}>Agenda</button>
                            </div>
                        </div>
                    </div>

                    {view === 'geral' && (
                        <div className="space-y-4">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Próximos Lembretes</h3>
                            {upcomingItems.length === 0 ? <div className="text-center p-8 bg-white rounded-[2rem] border border-slate-50 text-slate-400"><Check size={32} className="mx-auto mb-2 opacity-50"/><p className="font-bold text-sm">Tudo tranquilo por aqui!</p></div> : upcomingItems.map((item, idx) => (
                                <div key={idx} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex items-center gap-4 group">
                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${item.type === 'med' ? 'bg-blue-50 text-blue-500' : item.type === 'vac' ? 'bg-indigo-50 text-indigo-500' : 'bg-cyan-50 text-cyan-500'}`}>
                                        {item.type === 'med' && <Pill size={20}/>}{item.type === 'vac' && <Syringe size={20}/>}{item.type === 'app' && <Stethoscope size={20}/>}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-start"><p className="font-bold text-slate-800 truncate pr-2">{item.title}</p><span className={`text-[9px] font-black uppercase px-2 py-1 rounded-lg shrink-0 ${item.date === today ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-500'}`}>{item.date === today ? 'Hoje' : formatDate(item.date)}</span></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase truncate mt-0.5">{item.sub}</p>
                                        <p className="text-[10px] font-black text-slate-800 bg-slate-50 inline-block px-2 py-0.5 rounded-md mt-2">{item.time}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'meds' && (<div className="space-y-6"><div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><h3 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Novo Medicamento</h3><div className="grid grid-cols-2 gap-3 mb-3"><input placeholder="Remédio" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nMed.name} onChange={e=>setNMed({...nMed, name: e.target.value})}/><input placeholder="Paciente" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nMed.patient} onChange={e=>setNMed({...nMed, patient: e.target.value})}/></div><div className="grid grid-cols-2 gap-3 mb-3"><input placeholder="Dosagem" className="bg-slate-50 p-4 rounded-2xl w-full border-none outline-none" value={nMed.dosage} onChange={e=>setNMed({...nMed, dosage: e.target.value})}/><select className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold text-slate-600 outline-none" value={nMed.interval} onChange={e=>setNMed({...nMed, interval: e.target.value})}><option value="4">De 4 em 4h</option><option value="6">De 6 em 6h</option><option value="8">De 8 em 8h</option><option value="12">De 12 em 12h</option><option value="24">1x por dia</option></select></div><div className="grid grid-cols-2 gap-3 mb-3"><div><label className="text-[10px] font-black text-slate-400 ml-2">Data Início</label><input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none" value={nMed.startDate} onChange={e=>setNMed({...nMed, startDate: e.target.value})}/></div><div><label className="text-[10px] font-black text-slate-400 ml-2">Data Término</label><input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none" value={nMed.endDate} onChange={e=>setNMed({...nMed, endDate: e.target.value})}/></div></div><div className="mb-4"><label className="text-[10px] font-black text-slate-400 ml-2">Hora 1ª Dose</label><input type="time" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nMed.startTime} onChange={e=>setNMed({...nMed, startTime: e.target.value})}/></div><button onClick={saveMed} className="w-full bg-cyan-600 text-white py-4 rounded-2xl font-black shadow-lg">Salvar</button></div>{medications.map(m => (<div key={m.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-50"><div className="flex justify-between items-start mb-2"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center"><Pill size={20}/></div><div className="text-left"><p className="font-bold">{m.name}</p><p className="text-[10px] font-bold text-slate-400 uppercase">{m.patient} • {m.dosage || 'N/A'} • {m.interval}h</p></div></div><button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_meds', m.id))} className="text-slate-200 hover:text-red-500"><Trash2 size={16}/></button></div><div className="flex flex-wrap gap-2 mb-2">{getDoseSchedule(m.startTime, m.interval).map(t => <span key={t} className="bg-slate-50 px-2 py-1 rounded-lg text-[10px] font-black text-slate-500">{t}</span>)}</div></div>))}</div>)}

                    {view === 'vacs' && (<div className="space-y-6"><div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><h3 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Nova Vacina</h3><div className="grid grid-cols-2 gap-3 mb-3"><input placeholder="Vacina" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nVac.name} onChange={e=>setNVac({...nVac, name: e.target.value})}/><input placeholder="Paciente" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nVac.patient} onChange={e=>setNVac({...nVac, patient: e.target.value})}/></div><div className="grid grid-cols-2 gap-3 mb-4"><div><label className="text-[10px] font-black text-slate-400 ml-2">Data 1º dose</label><input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none" value={nVac.date} onChange={e=>setNVac({...nVac, date: e.target.value})}/></div><div><label className="text-[10px] font-black text-indigo-500 ml-2">Reforço</label><input type="date" className="bg-indigo-50 p-4 rounded-2xl w-full border-none font-bold text-indigo-600 outline-none" value={nVac.nextDoseDate} onChange={e=>setNVac({...nVac, nextDoseDate: e.target.value})}/></div></div><button onClick={saveVac} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">Salvar</button></div>{vaccines.map(v => (<div key={v.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center"><div className="flex items-center gap-4 text-left"><div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Syringe size={24}/></div><div><p className="font-bold">{v.name}</p><p className="text-[10px] font-bold text-slate-400 uppercase">{v.patient} • Dose: {formatDate(v.date)}</p></div></div><button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_vaccines', v.id))} className="text-slate-200 hover:text-red-500"><Trash2 size={16}/></button></div>))}</div>)}

                    {view === 'agenda' && (<div className="space-y-6"><div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><h3 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Nova Consulta</h3><input placeholder="Especialidade ou Procedimento" className="bg-slate-50 p-4 rounded-2xl w-full border-none mb-3 font-bold outline-none" value={nApp.title} onChange={e=>setNApp({...nApp, title: e.target.value})}/><div className="grid grid-cols-2 gap-3 mb-3"><input placeholder="Paciente" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nApp.patient} onChange={e=>setNApp({...nApp, patient: e.target.value})}/><input placeholder="Local/Clínica" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nApp.location} onChange={e=>setNApp({...nApp, location: e.target.value})}/></div><div className="grid grid-cols-2 gap-3 mb-4"><input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none" value={nApp.date} onChange={e=>setNApp({...nApp, date: e.target.value})}/><input type="time" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={nApp.time} onChange={e=>setNApp({...nApp, time: e.target.value})}/></div><button onClick={saveApp} className="w-full bg-cyan-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">Salvar</button></div>{healthRecords.map(a => (<div key={a.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center"><div className="flex items-center gap-4 text-left"><div className="w-10 h-10 bg-cyan-50 text-cyan-600 rounded-xl flex items-center justify-center"><Stethoscope size={20}/></div><div><p className="font-bold">{a.title}</p><p className="text-[10px] font-bold text-slate-400 uppercase">{a.patient} • {formatDate(a.date)} às {a.time} {a.location && `• ${a.location}`}</p></div></div><button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_health', a.id))} className="text-slate-200 hover:text-red-500"><Trash2 size={16}/></button></div>))}</div>)}
                </div>
            );
        };

        const GroceryModule = ({ groceries, familyId, user, appId, showStatus }) => {
            const [name, setName] = useState(''); const [cat, setCat] = useState('Mercearia'); const [qty, setQty] = useState(1); const [unit, setUnit] = useState('un'); const [price, setPrice] = useState('');
            const categories = ['Hortifruti', 'Carnes & Frios', 'Laticínios', 'Mercearia', 'Limpeza', 'Higiene', 'Bebidas', 'Outros'];
            const units = ['un', 'kg', 'g', 'L', 'ml'];
            const suggestionsByCategory = { 'Hortifruti': ['Banana', 'Maçã', 'Cebola', 'Batata', 'Tomate'], 'Carnes & Frios': ['Frango', 'Carne Moída', 'Queijo', 'Presunto'], 'Laticínios': ['Leite', 'Ovos', 'Manteiga', 'Iogurte'], 'Mercearia': ['Arroz', 'Feijão', 'Café', 'Açúcar', 'Pão'], 'Limpeza': ['Detergente', 'Sabão em Pó', 'Desinfetante'], 'Higiene': ['Papel Higiênico', 'Sabonete', 'Creme Dental'], 'Bebidas': ['Água', 'Refrigerante', 'Suco'], 'Outros': ['Ração', 'Saco de Lixo'] };

            const activeItems = groceries.filter(g => !g.bought); const boughtItems = groceries.filter(g => g.bought);

            const toggleItem = async (g) => { if (!user) return; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_groceries', g.id), { bought: !g.bought }); };
            
            const addItem = async (suggestedName = null) => { 
                const finalName = typeof suggestedName === 'string' ? suggestedName : name; 
                if (!user || !finalName) return; 
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_groceries'), { 
                    name: finalName, 
                    category: cat, 
                    quantity: parseValor(qty) || 1, 
                    unit: unit, 
                    price: parseValor(price), 
                    familyId, 
                    bought: false, 
                    createdAt: Date.now() 
                }); 
                setName(''); setQty(1); setPrice(''); showStatus("Adicionado à lista!"); 
            };
            
            const clearCart = () => { if (!user) return; boughtItems.forEach(async (g) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_groceries', g.id)); }); showStatus("Carrinho esvaziado!"); };
            
            const updateItemPrice = async (g, newPrice) => {
                if (!user) return;
                const priceNum = parseValor(newPrice);
                if (priceNum !== g.price) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_groceries', g.id), { price: priceNum });
                }
            };

            const totalGeral = groceries.reduce((acc, curr) => acc + (parseValor(curr.price) * (parseValor(curr.quantity) || 1)), 0);

            return (
                <div className="space-y-6 pb-24 text-left text-slate-800 animate-in slide-in-from-right duration-300">
                    <div className="bg-amber-500 p-6 rounded-[2.5rem] text-white shadow-xl text-center"><h2 className="text-2xl font-black mb-1">Lista de Compras</h2><p className="text-amber-100 text-xs font-bold uppercase opacity-80 mb-4">Mercado Inteligente</p><div className="flex gap-2 justify-center bg-black/10 p-3 rounded-2xl"><div className="text-center px-4"><p className="text-[10px] uppercase font-black opacity-80 tracking-widest">Total no Carrinho</p><p className="font-black text-xl">R$ {totalGeral.toFixed(2)}</p></div></div></div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div className="grid grid-cols-2 gap-3 mb-4"><select className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold text-slate-600 outline-none" value={cat} onChange={e=>setCat(e.target.value)}>{categories.map(c => <option key={c} value={c}>{c}</option>)}</select><div className="flex bg-slate-50 rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-amber-300"><input type="number" min="0.1" step="0.1" className="bg-transparent p-4 w-1/2 border-none font-bold outline-none text-center" value={qty} onChange={e=>setQty(e.target.value)} /><select className="bg-transparent p-4 w-1/2 border-none font-bold text-slate-600 outline-none cursor-pointer" value={unit} onChange={e=>setUnit(e.target.value)}>{units.map(u => <option key={u} value={u}>{u}</option>)}</select></div></div>
                        <div className="mb-4">
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Frequentes: {cat}</p>
                            <div className="flex overflow-x-auto gap-2 pb-3" style={{scrollbarWidth: 'thin'}}>
                                {(suggestionsByCategory[cat] || []).map(s => (<button key={s} onClick={() => addItem(s)} className="bg-amber-50 text-amber-600 px-3 py-1.5 rounded-xl text-[10px] font-black whitespace-nowrap active:scale-95 transition-transform flex items-center gap-1"><Plus size={12}/> {s}</button>))}
                            </div>
                        </div>
                        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ou digite o que precisamos..." className="bg-slate-50 p-4 rounded-2xl w-full border-none mb-3 font-bold outline-none focus:ring-2 focus:ring-amber-300" onKeyDown={(e) => e.key === 'Enter' && addItem()}/>
                        <div className="mb-4 relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-black">R$</span><input type="number" placeholder="Preço estimado (Opcional)" value={price} onChange={e=>setPrice(e.target.value)} className="bg-slate-50 p-4 pl-12 rounded-2xl w-full border-none font-bold outline-none focus:ring-2 focus:ring-amber-300"/></div>
                        <button onClick={()=>addItem()} className="w-full bg-amber-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2"><ShoppingCart size={18} /> Adicionar ao Carrinho</button>
                    </div>

                    <div className="space-y-6">
                        {activeItems.length === 0 && boughtItems.length === 0 ? (<div className="text-center p-8 bg-white rounded-[2rem] border border-slate-50 text-slate-400"><ShoppingCart size={32} className="mx-auto mb-2 opacity-50"/><p className="font-bold text-sm">Lista vazia!</p></div>) : (categories.map(categoryName => { 
                            const itemsInCategory = activeItems.filter(g => (g.category || 'Outros') === categoryName); 
                            if (itemsInCategory.length === 0) return null; 
                            return (
                                <div key={categoryName} className="space-y-2">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 flex items-center gap-2"><List size={12} className="text-amber-400"/> {categoryName}</h4>
                                    {itemsInCategory.map(g => (
                                        <div key={g.id} className="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border border-slate-50 group">
                                            <div className="flex items-center gap-3 flex-1 min-w-0">
                                                <button onClick={()=>toggleItem(g)} className="w-8 h-8 rounded-xl border-2 border-slate-100 hover:border-amber-400 flex items-center justify-center transition-all shrink-0"></button>
                                                <div className="min-w-0 pr-2">
                                                    <p className="font-bold text-slate-700 truncate">{g.name}</p>
                                                    <div className="flex gap-2 mt-0.5 items-center flex-wrap">
                                                        <span className="text-[9px] font-black text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded uppercase">{g.quantity || 1} {g.unit || 'un'}</span>
                                                        <div className="flex items-center bg-emerald-50 px-1.5 py-0.5 rounded focus-within:ring-1 focus-within:ring-emerald-400" title="Clique para editar o preço">
                                                            <span className="text-[9px] font-black text-emerald-600 mr-0.5">R$</span>
                                                            <input type="number" step="0.01" min="0" defaultValue={g.price || ''} placeholder="0.00" onBlur={(e) => updateItemPrice(g, e.target.value)} onKeyDown={(e) => e.key === 'Enter' && e.target.blur()} className="bg-transparent text-[9px] font-black text-emerald-600 w-12 outline-none p-0 m-0 placeholder:text-emerald-300"/>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_groceries', g.id))} className="text-slate-200 hover:text-red-500 transition-colors shrink-0"><Trash2 size={18}/></button>
                                        </div>
                                    ))}
                                </div>
                            );
                        }))}

                        {boughtItems.length > 0 && (
                            <div className="pt-6 border-t border-slate-200 space-y-3">
                                <div className="flex justify-between items-center px-2"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Já Comprados ({boughtItems.length})</p><button onClick={clearCart} className="text-[9px] font-black text-red-500 uppercase bg-red-50 px-2 py-1 rounded-lg active:scale-95 transition-all flex items-center gap-1"><Trash2 size={10} /> Esvaziar</button></div>
                                {boughtItems.map(g => (
                                    <div key={g.id} className="bg-slate-50 p-4 rounded-2xl flex items-center justify-between opacity-60">
                                        <div className="flex items-center gap-3 flex-1 min-w-0">
                                            <Check size={20} className="text-emerald-500 shrink-0" />
                                            <div className="min-w-0 flex-1">
                                                <p className="line-through text-slate-500 font-bold truncate">{g.name}</p>
                                                <div className="flex gap-2 mt-0.5 items-center flex-wrap">
                                                    <span className="text-[9px] font-black text-slate-400 uppercase">{g.quantity || 1} {g.unit || 'un'}</span>
                                                    <div className="flex items-center bg-slate-200/50 px-1.5 py-0.5 rounded focus-within:ring-1 focus-within:ring-slate-300">
                                                        <span className="text-[9px] font-black text-slate-500 mr-0.5">R$</span>
                                                        <input type="number" step="0.01" min="0" defaultValue={g.price || ''} placeholder="0.00" onBlur={(e) => updateItemPrice(g, e.target.value)} onKeyDown={(e) => e.key === 'Enter' && e.target.blur()} className="bg-transparent text-[9px] font-black text-slate-600 w-12 outline-none p-0 m-0 placeholder:text-slate-400"/>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={()=>toggleItem(g)} className="bg-amber-100 text-amber-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase active:scale-95 transition-all shrink-0 ml-2">Repor</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const LeisureModule = ({ events, familyId, user, appId, formatDate, today, showStatus }) => {
            const [ne, setNe] = useState({ title: '', date: today, time: '18:00', location: '', notes: '' });
            const saveEvent = async () => { if (!user || !ne.title) return; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_events'), { ...ne, familyId, createdAt: Date.now() }); setNe({ title: '', date: today, time: '18:00', location: '', notes: '' }); showStatus("Momento salvo!"); };

            return (
                <div className="space-y-6 pb-24 text-left text-slate-800 animate-in slide-in-from-right duration-300">
                    <div className="bg-rose-500 p-6 rounded-[2.5rem] text-white shadow-xl text-center"><h2 className="text-2xl font-black mb-1">Lazer e Momentos</h2><p className="text-rose-100 text-xs font-bold uppercase opacity-80">Planeje seus eventos</p></div>
