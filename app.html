                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><input placeholder="Nome do Evento" className="bg-slate-50 p-4 rounded-2xl w-full border-none mb-3 font-bold outline-none" value={ne.title} onChange={e=>setNe({...ne, title: e.target.value})}/><div className="grid grid-cols-2 gap-3 mb-3"><input type="date" className="bg-slate-50 p-4 rounded-2xl w-full border-none text-slate-500 outline-none font-bold" value={ne.date} onChange={e=>setNe({...ne, date: e.target.value})}/><input type="time" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold text-slate-600 outline-none" value={ne.time} onChange={e=>setNe({...ne, time: e.target.value})}/></div><div className="mb-4"><input placeholder="Local" className="bg-slate-50 p-4 rounded-2xl w-full border-none font-bold outline-none" value={ne.location} onChange={e=>setNe({...ne, location: e.target.value})}/></div><button onClick={saveEvent} className="w-full bg-rose-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">Salvar Momento</button></div>
                    <div className="space-y-3"><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Eventos Futuros</h3>{events.sort((a,b) => a.date.localeCompare(b.date)).map(ev => (<div key={ev.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center group"><div className="flex items-center gap-4 text-left"><div className="w-12 h-12 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center shadow-inner"><PartyPopper size={24}/></div><div><p className="font-bold text-slate-800">{ev.title}</p><p className="text-[10px] font-bold text-slate-400 uppercase">{formatDate(ev.date)} às {ev.time || '--:--'} {ev.location && `• ${ev.location}`}</p></div></div><button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_events', ev.id))} className="text-slate-200 hover:text-red-500 transition-colors"><Trash2 size={18}/></button></div>))}</div>
                </div>
            );
        };

        const WelcomeScreen = ({ handleLogin, showConfirmNew, setShowConfirmNew, createFamily, statusMsg }) => {
          const [n, setN] = useState(''); const [p, setP] = useState('');
          const [installPrompt, setInstallPrompt] = useState(null);

          // Escuta o evento do navegador que permite instalar o PWA
          useEffect(() => {
            const handler = (e) => { 
                e.preventDefault(); 
                setInstallPrompt(e); 
            };
            window.addEventListener('beforeinstallprompt', handler);
            return () => window.removeEventListener('beforeinstallprompt', handler);
          }, []);

          // Função para disparar a caixa de download nativa do telemóvel
          const handleInstall = () => {
            if (installPrompt) {
                installPrompt.prompt();
                installPrompt.userChoice.then(() => setInstallPrompt(null));
            }
          };

          return (
            <div className="min-h-screen bg-[#0F172A] flex flex-col items-center justify-center p-6 text-white relative overflow-hidden font-sans">
              <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none"></div>
              <div className="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>
              <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-[0.03] pointer-events-none"></div>

              <div className="w-full max-w-sm relative z-10 space-y-10 animate-in fade-in zoom-in duration-700">
                <div className="space-y-6 text-center"><div className="flex justify-center"><div className="relative"><div className="w-24 h-24 bg-gradient-to-tr from-indigo-600 to-indigo-400 rounded-[2.8rem] flex items-center justify-center shadow-[0_20px_50px_rgba(79,70,229,0.3)] border border-white/10 relative overflow-hidden"><Users size={44} className="text-white relative z-10" /><div className="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent"></div></div><div className="absolute -top-1 -right-1"><div className="bg-rose-500 p-2 rounded-full shadow-lg border-2 border-[#0F172A] animate-pulse"><Heart size={14} className="text-white fill-white" /></div></div></div></div>
                <div className="space-y-2"><h1 className="text-4xl font-black tracking-tight leading-none">Família<span className="text-indigo-400 italic">Connect</span><span className="text-indigo-500">.</span></h1><p className="text-slate-400 font-medium text-sm leading-relaxed max-w-[260px] mx-auto">conectando tarefas, finanças e momentos tudo em um único lugar.</p></div></div>
                
                <div className="bg-white/[0.03] backdrop-blur-2xl p-8 rounded-[3.5rem] border border-white/10 shadow-2xl relative"><div className="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                  <div className="space-y-5">
                    <div className="space-y-2 group text-left"><label className="text-[10px] font-black text-slate-500 uppercase ml-5 tracking-[0.15em]">ID Familiar</label><div className="relative"><div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"><User size={18} /></div><input className="w-full bg-[#1E293B]/50 py-4 pl-12 pr-6 rounded-3xl font-bold text-white border border-white/5 outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all placeholder:text-slate-600" placeholder="Nome da Família" value={n} onChange={e => setN(e.target.value)} /></div></div>
                    <div className="space-y-2 group text-left"><label className="text-[10px] font-black text-slate-500 uppercase ml-5 tracking-[0.15em]">Senha de Acesso</label><div className="relative"><div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"><Lock size={18} /></div><input className="w-full bg-[#1E293B]/50 py-4 pl-12 pr-6 rounded-3xl font-bold text-white border border-white/5 outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all placeholder:text-slate-600" type="password" placeholder="••••••••" value={p} onChange={e => setP(e.target.value)} /></div></div>
                    <div className="pt-4"><button onClick={() => handleLogin(n, p)} className="w-full bg-gradient-to-r from-indigo-600 to-indigo-500 text-white font-black py-5 rounded-3xl flex items-center justify-center gap-3 hover:shadow-[0_10px_30px_rgba(79,70,229,0.4)] active:scale-95 transition-all relative overflow-hidden group/btn"><span className="relative z-10">Acessar agora</span><ArrowRight size={20} className="relative z-10 group-hover/btn:translate-x-1 transition-transform" /><div className="absolute inset-0 bg-white opacity-0 group-hover/btn:opacity-10 transition-opacity"></div></button></div>
                  </div>
                </div>

                {/* Mostra o botão de instalar a App apenas se o dispositivo suportar (maioria dos Androids/Chrome) */}
                {installPrompt && (
                    <button onClick={handleInstall} className="w-full max-w-sm bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-3xl flex items-center justify-center gap-2 shadow-[0_10px_30px_rgba(16,185,129,0.3)] active:scale-95 transition-all animate-in slide-in-from-bottom duration-500 mt-4">
                        Baixar App (Ecrã Principal)
                    </button>
                )}

                <div className="flex flex-col items-center space-y-6 pt-2"><div className="flex items-center gap-2 px-4 py-2 bg-white/5 rounded-full border border-white/5"><ShieldCheck size={14} className="text-emerald-500" /><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sincronização Segura</span></div><p className="text-slate-600 font-black text-[9px] uppercase tracking-[0.3em] mt-4">&copy; 2026 Connect Pro Technology</p></div>
              </div>

              {showConfirmNew && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-50 text-white animate-in fade-in duration-300"><div className="bg-[#1E293B] border border-white/10 rounded-[3rem] p-10 w-full max-w-xs text-center shadow-2xl animate-in zoom-in duration-300 relative"><div className="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6"><Users size={32} className="text-indigo-400"/></div><h3 className="font-black text-2xl mb-2 tracking-tight">Nova Família?</h3><p className="text-slate-400 text-sm font-medium mb-8">A base de dados para <span className="text-indigo-400 font-bold">{showConfirmNew.name}</span> não existe. Deseja criar agora?</p><button onClick={createFamily} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl mb-4 shadow-lg active:scale-95 transition-all">Criar Gratuitamente</button><button onClick={()=>setShowConfirmNew(null)} className="text-slate-500 font-black uppercase text-[10px] tracking-widest hover:text-white transition-colors">Cancelar</button></div></div>
              )}

              {statusMsg && statusMsg.text && (
                <div className={`fixed top-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl shadow-2xl z-50 text-white font-black text-xs flex items-center gap-3 animate-bounce max-w-xs text-center ${statusMsg.type === 'error' ? 'bg-red-500' : 'bg-slate-900'}`}><AlertCircle size={20} className="shrink-0"/> {statusMsg.text}</div>
              )}
            </div>
          );
        };

        function App() {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [loading, setLoading] = useState(true);
          const [statusMsg, setStatusMsg] = useState({ text: '', type: '' });

          const [familyId, setFamilyId] = useState(() => localStorage.getItem('fc_familyId') || null);
          const [familyName, setFamilyName] = useState(() => localStorage.getItem('fc_familyName') || '');
          const [familyLogo, setFamilyLogo] = useState(null);
          const [showConfirmNew, setShowConfirmNew] = useState(null); 

          const [finances, setFinances] = useState([]);
          const [recurringFinances, setRecurringFinances] = useState([]);
          const [tasks, setTasks] = useState([]);
          const [recurringTasks, setRecurringTasks] = useState([]); 
          const [groceries, setGroceries] = useState([]);
          const [events, setEvents] = useState([]);
          const [healthRecords, setHealthRecords] = useState([]); 
          const [medications, setMedications] = useState([]); 
          const [vaccines, setVaccines] = useState([]); 
          const [localNote, setLocalNote] = useState(''); 

          const showStatus = (text, type = 'info') => {
            setStatusMsg({ text, type });
            if (type !== 'loading') {
                setTimeout(() => setStatusMsg({ text: '', type: '' }), 5000);
            }
          };

          const handleFirebaseError = (err) => {
              console.error(err);
              if (err.code === 'permission-denied' || (err.message && err.message.includes("permissions"))) {
                  showStatus("Erro: O Firebase bloqueou! Vá às Regras do Firestore, mude para 'if true;' e clique em PUBLICAR.", "error");
              }
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (error) { 
                console.error("Erro na autenticação:", error); 
                showStatus("Erro de Auth: " + error.message, "error");
              }
            };
            initAuth();
            
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !familyId) return;

            const unsubFamily = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'fc_families', familyId), (snap) => {
                if (snap.exists()) { setFamilyLogo(snap.data().logo || null); setLocalNote(snap.data().stickyNote || "Bem-vindos!"); }
            }, (err) => handleFirebaseError(err));

            const syncCollection = (collectionName, setter) => {
                const q = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(q, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(i => i.familyId === familyId);
                    setter(data);
                }, (err) => handleFirebaseError(err));
            };

            const unsubs = [
                unsubFamily, syncCollection('fc_finances', setFinances), syncCollection('fc_recurring', setRecurringFinances),
                syncCollection('fc_tasks', setTasks), syncCollection('fc_recurring_tasks', setRecurringTasks), syncCollection('fc_groceries', setGroceries),
                syncCollection('fc_health', setHealthRecords), syncCollection('fc_meds', setMedications), syncCollection('fc_vaccines', setVaccines), syncCollection('fc_events', setEvents)
            ];

            return () => unsubs.forEach(unsub => unsub());
          }, [user, familyId]);

          const handleLogin = async (name, pass) => {
            if (!user) return showStatus("Aguarde, ligando ao servidor...", "error");
            if (!name.trim() || !pass.trim()) return showStatus("Preencha todos os campos!", "error");
            const id = name.trim().toLowerCase().replace(/\s+/g, '-');
            try {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_families', id));
                if (snap.exists()) {
                    if (snap.data().password === pass) {
                        setFamilyId(id); setFamilyName(snap.data().displayName); localStorage.setItem('fc_familyId', id); localStorage.setItem('fc_familyName', snap.data().displayName);
                        showStatus(`Bem-vinda de volta, Família ${snap.data().displayName}!`, "success");
                    } else { showStatus("Senha incorreta!", "error"); }
                } else { setShowConfirmNew({ id, name, pass }); }
            } catch (e) { handleFirebaseError(e); }
          };

          const createFamily = async () => {
            if (!user) return showStatus("Aguardando conexão segura com o servidor...", "error");
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_families', showConfirmNew.id), { displayName: showConfirmNew.name, password: showConfirmNew.pass, stickyNote: "Bem-vindos ao vosso novo espaço!", logo: familyLogo, createdAt: Date.now(), ownerId: user.uid });
                setFamilyId(showConfirmNew.id); setFamilyName(showConfirmNew.name); localStorage.setItem('fc_familyId', showConfirmNew.id); localStorage.setItem('fc_familyName', showConfirmNew.name);
                setShowConfirmNew(null); showStatus("Família criada com sucesso!", "success");
            } catch (e) { handleFirebaseError(e); }
          };

          const updateFamilyLogo = async (base64Image) => {
            if (base64Image.length > 1000000) return showStatus("A imagem é muito grande. Escolha uma menor.", "error");
            setFamilyLogo(base64Image);
            if (!familyId) return; 
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_families', familyId), { logo: base64Image }); showStatus("Foto de perfil atualizada!", "success"); } 
            catch (e) { handleFirebaseError(e); }
          };

          if (!user && !loading) return null;
          if (!familyId) return <WelcomeScreen handleLogin={handleLogin} showConfirmNew={showConfirmNew} setShowConfirmNew={setShowConfirmNew} createFamily={createFamily} statusMsg={statusMsg} />;

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col font-sans overflow-x-hidden print:bg-white">
              <main className="flex-1 max-w-md mx-auto w-full p-6 pb-32 print:p-0 print:max-w-none">
                {activeTab === 'dashboard' && <Dashboard familyName={familyName} familyLogo={familyLogo} localNote={localNote} setLocalNote={setLocalNote} user={user} familyId={familyId} setActiveTab={setActiveTab} finances={finances} tasks={tasks} medications={medications} groceries={groceries} events={events} vaccines={vaccines} healthRecords={healthRecords} updateFamilyLogo={updateFamilyLogo} />}
                {activeTab === 'finance' && <FinanceModule finances={finances} recurringFinances={recurringFinances} familyId={familyId} formatDate={formatDate} today={today} appId={appId} showStatus={showStatus} />}
                {activeTab === 'tasks' && <TaskModule tasks={tasks} recurringTasks={recurringTasks} familyId={familyId} formatDate={formatDate} today={today} appId={appId} showStatus={showStatus} />}
                {activeTab === 'groceries' && <GroceryModule groceries={groceries} familyId={familyId} user={user} appId={appId} showStatus={showStatus} />}
                {activeTab === 'health' && <HealthModule medications={medications} vaccines={vaccines} healthRecords={healthRecords} familyId={familyId} today={today} appId={appId} formatDate={formatDate} showStatus={showStatus} />}
                {activeTab === 'leisure' && <LeisureModule events={events} familyId={familyId} user={user} appId={appId} formatDate={formatDate} today={today} showStatus={showStatus} />}
              </main>

              <nav className="fixed bottom-6 left-4 right-4 bg-white/80 backdrop-blur-xl border border-white/20 px-2 py-2 max-w-md mx-auto rounded-[2.5rem] shadow-2xl z-40 print:hidden">
                <div className="flex justify-between items-center">
                  <NavBtn icon={<Home size={22}/>} active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} color="text-indigo-600" />
                  <NavBtn icon={<DollarSign size={22}/>} active={activeTab === 'finance'} onClick={() => setActiveTab('finance')} color="text-emerald-600" />
                  <NavBtn icon={<CheckSquare size={22}/>} active={activeTab === 'tasks'} onClick={() => setActiveTab('tasks')} color="text-indigo-600" />
                  <NavBtn icon={<Activity size={22}/>} active={activeTab === 'health'} onClick={() => setActiveTab('health')} color="text-cyan-600" />
                  <NavBtn icon={<ShoppingCart size={22}/>} active={activeTab === 'groceries'} onClick={() => setActiveTab('groceries')} color="text-amber-500" />
                  <NavBtn icon={<PartyPopper size={22}/>} active={activeTab === 'leisure'} onClick={() => setActiveTab('leisure')} color="text-rose-500" />
                </div>
              </nav>

              {statusMsg.text && (
                <div className={`fixed top-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl shadow-2xl z-50 text-white font-black text-xs flex items-center gap-3 animate-bounce print:hidden ${statusMsg.type === 'error' ? 'bg-red-500' : 'bg-slate-900'}`}>
                    <AlertCircle size={20} className="shrink-0"/> {statusMsg.text}
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
