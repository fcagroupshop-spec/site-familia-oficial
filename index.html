<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamíliaConnect - O Aplicativo da Sua Família</title>
    
    <!-- Tags PWA para compatibilidade em telemóveis -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamíliaConnect">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração de Importações (ES Modules) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
    </script>
    
    <!-- Compilador Babel para o browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .highlight-pulse {
            animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); border-color: #3b82f6; }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); border-color: #93c5fd; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
    
    <!-- AQUI É ONDE O REACT VAI RENDERIZAR O SITE -->
    <div id="root"></div>

    <!-- CÓDIGO DA APLICAÇÃO -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          ArrowRight, CheckCircle2, ShoppingCart, Menu, X, PlayCircle, Clock, Users, 
          Sparkles, DollarSign, Activity, Syringe, PartyPopper, Heart, ShieldCheck, 
          Star, Smartphone, Apple, Check, HeartPulse, Calendar, ChevronRight, Download, ArrowUp
        } from 'lucide-react';

        function App() {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [isVideoModalOpen, setIsVideoModalOpen] = useState(false);
          const [isInstallModalOpen, setIsInstallModalOpen] = useState(false);
          const [targetPlatform, setTargetPlatform] = useState(null);
          const [highlightBox, setHighlightBox] = useState(false);

          const scrollToSection = (id) => {
            const element = document.getElementById(id);
            if (element) {
              element.scrollIntoView({ behavior: 'smooth' });
              setIsMenuOpen(false);
            }
          };

          const openInstallModal = (platform) => {
            setTargetPlatform(platform);
            setIsInstallModalOpen(true);
            setHighlightBox(false);
            setTimeout(() => setHighlightBox(true), 1000);
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 selection:bg-blue-900 selection:text-white overflow-x-hidden">
              
              {/* BARRA DE NAVEGAÇÃO */}
              <nav className="fixed w-full z-40 bg-white/90 backdrop-blur-md border-b border-slate-100 transition-all">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                      <div className="w-10 h-10 bg-blue-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <Users size={24} />
                      </div>
                      <span className="font-black text-xl tracking-tight text-blue-950">
                        Família<span className="text-blue-500 italic">Connect</span>
                      </span>
                    </div>

                    <div className="hidden md:flex items-center space-x-8">
                      <button onClick={() => scrollToSection('funcionalidades')} className="text-sm font-bold text-slate-500 hover:text-blue-900 transition-colors cursor-pointer">Funcionalidades</button>
                      <button onClick={() => scrollToSection('beneficios')} className="text-sm font-bold text-slate-500 hover:text-blue-900 transition-colors cursor-pointer">Benefícios</button>
                      <button onClick={() => openInstallModal('any')} className="bg-blue-900 hover:bg-blue-800 text-white px-6 py-2.5 rounded-full text-sm font-black transition-all transform hover:scale-105 shadow-lg shadow-blue-900/30 cursor-pointer">
                        Obter o App
                      </button>
                    </div>

                    <div className="md:hidden flex items-center">
                      <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-slate-500 p-2 cursor-pointer">
                        {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
                      </button>
                    </div>
                  </div>
                </div>

                {isMenuOpen && (
                  <div className="md:hidden bg-white border-t border-slate-100 p-6 space-y-4 shadow-xl animate-in slide-in-from-top duration-300">
                    <button onClick={() => scrollToSection('funcionalidades')} className="block w-full text-left text-base font-bold text-slate-600 cursor-pointer">Funcionalidades</button>
                    <button onClick={() => scrollToSection('beneficios')} className="block w-full text-left text-base font-bold text-slate-600 cursor-pointer">Benefícios</button>
                    <button onClick={() => { setIsMenuOpen(false); openInstallModal('any'); }} className="w-full bg-blue-900 text-white px-6 py-4 rounded-xl text-base font-black shadow-lg text-center cursor-pointer">
                      Baixar Agora
                    </button>
                  </div>
                )}
              </nav>

              {/* HERO SECTION */}
              <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-[#1e3a8a]">
                <div className="absolute top-0 right-0 -translate-y-12 translate-x-1/3 w-[800px] h-[800px] bg-blue-800 rounded-full blur-[120px] opacity-50 pointer-events-none"></div>
                <div className="absolute bottom-0 left-0 translate-y-1/3 -translate-x-1/3 w-[600px] h-[600px] bg-cyan-900 rounded-full blur-[100px] opacity-40 pointer-events-none"></div>
                
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                  <div className="grid lg:grid-cols-2 gap-12 lg:gap-8 items-center">
                    <div className="text-center lg:text-left space-y-8 relative z-20">
                      <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-800/50 border border-blue-700 backdrop-blur-sm text-blue-100 text-xs font-black uppercase tracking-widest">
                        <Sparkles size={14} className="text-cyan-400" /> A Solução Nº1 para o seu Lar
                      </div>
                      <h1 className="text-4xl md:text-5xl lg:text-6xl font-black text-white leading-[1.1] tracking-tight">
                        A gestão da sua casa, <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-300">finalmente em paz.</span>
                      </h1>
                      <p className="text-lg md:text-xl text-blue-100 font-medium max-w-2xl mx-auto lg:mx-0 leading-relaxed">
                        Organize tarefas, finanças e a saúde da família num único lugar. Tudo sincronizado em tempo real nos celulares de todos.
                      </p>
                      
                      <div className="flex flex-col gap-6 pt-4 items-center lg:items-start relative z-30">
                        <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                          <button onClick={() => openInstallModal('ios')} className="bg-black text-white px-6 py-3 rounded-2xl flex items-center gap-3 hover:scale-105 transition-all border border-white/10 shadow-xl group w-full sm:w-auto min-w-[200px]">
                            <Apple size={28} className="group-hover:text-blue-400" />
                            <div className="text-left leading-none">
                              <p className="text-[10px] uppercase font-bold text-slate-400 mb-1">Acessar Web App</p>
                              <p className="text-lg font-black tracking-tight">Para iPhone</p>
                            </div>
                          </button>

                          <button onClick={() => openInstallModal('android')} className="bg-black text-white px-6 py-3 rounded-2xl flex items-center gap-3 hover:scale-105 transition-all border border-white/10 shadow-xl group w-full sm:w-auto min-w-[200px]">
                            <Smartphone size={28} className="group-hover:text-blue-400" />
                            <div className="text-left leading-none">
                              <p className="text-[10px] uppercase font-bold text-slate-400 mb-1">Acessar Web App</p>
                              <p className="text-lg font-black tracking-tight">Para Android</p>
                            </div>
                          </button>
                        </div>
                        
                        <button 
                          onClick={() => setIsVideoModalOpen(true)}
                          className="text-white hover:text-cyan-300 font-black text-lg transition-all flex items-center gap-2 group cursor-pointer"
                        >
                          <PlayCircle size={24} className="group-hover:scale-110 transition-transform" /> Ver demonstração
                        </button>
                      </div>
                    </div>
                    
                    <div className="relative mx-auto w-full max-w-lg lg:max-w-none pointer-events-none">
                      <div className="relative rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white/10 bg-[#f8fafc] aspect-square flex items-center justify-center">
                         <img src="https://images.unsplash.com/photo-1609220136736-443140cffec6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Família conectada" className="absolute inset-0 w-full h-full object-cover opacity-90" />
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* FUNCIONALIDADES */}
              <section id="funcionalidades" className="py-24 bg-white px-4">
                <div className="max-w-7xl mx-auto">
                  <div className="text-center mb-20 space-y-4">
                    <h2 className="text-3xl md:text-5xl font-black text-slate-900 tracking-tight text-center">Um Ecossistema para o seu Lar</h2>
                    <p className="text-lg text-slate-500 font-medium max-w-2xl mx-auto text-center">Tudo o que a sua família precisa num único aplicativo intuitivo.</p>
                  </div>

                  <div className="space-y-32">
                    <div className="grid lg:grid-cols-2 gap-16 items-center">
                      <div className="space-y-6 order-2 lg:order-1">
                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center shadow-inner">
                          <DollarSign size={32} />
                        </div>
                        <h3 className="text-3xl md:text-4xl font-black text-slate-900 text-left">Finanças Sem Atritos</h3>
                        <p className="text-slate-600 text-lg leading-relaxed text-left">
                          Controle as despesas da casa com total transparência. Registre gastos, receba alertas de boletos e saiba exatamente quanto a família pode gastar por mês.
                        </p>
                      </div>
                      <div className="order-1 lg:order-2 bg-slate-100 rounded-[3rem] p-10 shadow-inner">
                        <div className="bg-white rounded-2xl p-6 shadow-xl space-y-4 border border-slate-200">
                          <p className="font-black text-[10px] text-slate-400 uppercase text-left">Saldo Familiar</p>
                          <div className="flex justify-between items-center"><p className="font-bold text-slate-700">Disponível</p><span className="text-emerald-500 font-black">R$ 5.420,00</span></div>
                          <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div className="bg-emerald-500 w-[70%] h-full"></div></div>
                        </div>
                      </div>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                      <div className="bg-blue-50 p-8 rounded-[2.5rem] border border-blue-100 space-y-4 hover:shadow-lg transition-all">
                        <div className="w-12 h-12 bg-blue-500 text-white rounded-xl flex items-center justify-center"><CheckCircle2 size={24}/></div>
                        <h4 className="text-xl font-black text-blue-900">Tarefas & Rotinas</h4>
                        <p className="text-blue-800 text-sm font-medium leading-relaxed">Atribua responsáveis e acabe com as discussões de "quem faz o quê" em casa.</p>
                      </div>
                      <div className="bg-rose-50 p-8 rounded-[2.5rem] border border-rose-100 space-y-4 hover:shadow-lg transition-all">
                        <div className="w-12 h-12 bg-rose-500 text-white rounded-xl flex items-center justify-center"><HeartPulse size={24}/></div>
                        <h4 className="text-xl font-black text-rose-900">Saúde & Vacinas</h4>
                        <p className="text-rose-800 text-sm font-medium leading-relaxed">Controle horários de medicação e o histórico de vacinação de toda a família.</p>
                      </div>
                      <div className="bg-amber-50 p-8 rounded-[2.5rem] border border-amber-100 space-y-4 hover:shadow-lg transition-all">
                        <div className="w-12 h-12 bg-amber-500 text-white rounded-xl flex items-center justify-center"><ShoppingCart size={24}/></div>
                        <h4 className="text-xl font-black text-amber-900">Lista de Compras</h4>
                        <p className="text-amber-800 text-sm font-medium leading-relaxed">Adicione itens no trabalho e quem estiver no mercado verá a lista na hora.</p>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* BENEFÍCIOS */}
              <section id="beneficios" className="py-24 bg-slate-50 px-4">
                <div className="max-w-7xl mx-auto text-center">
                  <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-16">Por que usar o Família Connect?</h2>
                  <div className="grid md:grid-cols-3 gap-12">
                    <div className="space-y-4">
                      <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto shadow-sm text-blue-600"><Clock size={32}/></div>
                      <h5 className="text-xl font-black text-slate-900">Economize Tempo</h5>
                    </div>
                    <div className="space-y-4">
                      <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto shadow-sm text-emerald-600"><ShieldCheck size={32}/></div>
                      <h5 className="text-xl font-black text-slate-900">Privacidade Total</h5>
                    </div>
                    <div className="space-y-4">
                      <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto shadow-sm text-amber-600"><Star size={32}/></div>
                      <h5 className="text-xl font-black text-slate-900">Simplicidade Extrema</h5>
                    </div>
                  </div>
                </div>
              </section>

              {/* FOOTER */}
              <footer className="py-20 bg-slate-50 border-t border-slate-200 px-4">
                <div className="max-w-7xl mx-auto text-center space-y-8">
                    <div className="flex justify-center items-center gap-2 opacity-40 grayscale text-slate-900 font-black">
                      <Users size={24} />
                      <span className="text-xl">Família Connect</span>
                    </div>
                    <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em]">&copy; 2026 Família Connect Pro. Todos os direitos reservados.</p>
                </div>
              </footer>

              {/* ========================================= */}
              {/* MODAL DO VÍDEO - AQUI ESTÁ A CORREÇÃO!    */}
              {/* ========================================= */}
              {isVideoModalOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-blue-950/90 backdrop-blur-sm">
                  <div className="relative w-full max-w-4xl bg-black rounded-3xl overflow-hidden shadow-2xl animate-in zoom-in duration-300 border border-white/10">
                    
                    {/* Botão de Fechar */}
                    <button 
                      onClick={() => setIsVideoModalOpen(false)} 
                      className="absolute top-4 right-4 z-20 bg-black/60 text-white p-2 rounded-full hover:bg-red-500 transition-colors cursor-pointer"
                    >
                      <X size={24} />
                    </button>
                    
                    {/* O Vídeo */}
                    <div className="aspect-video w-full">
                      <video 
                        className="w-full h-full object-cover" 
                        controls 
                        autoPlay 
                        playsInline
                        src="./video.mp4" 
                      />
                    </div>
                    
                  </div>
                </div>
              )}

              {/* MODAL DE INSTALAÇÃO DA APP */}
              {isInstallModalOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-blue-950/80 backdrop-blur-sm">
                  <div className="relative w-full max-w-md bg-white rounded-[2.5rem] p-8 shadow-2xl animate-in zoom-in duration-300">
                    <button onClick={() => setIsInstallModalOpen(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-600 transition-colors">
                      <X size={24} />
                    </button>
                    
                    <div className="text-center space-y-6">
                      <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-2 shadow-sm border border-blue-100">
                        <Download size={40} />
                      </div>
                      
                      <div>
                        <h3 className="text-2xl font-black text-slate-800 mb-2">Instalar Aplicativo</h3>
                        <p className="text-slate-500 text-sm leading-relaxed">
                          O FamíliaConnect é instalado diretamente de forma leve e rápida.
                        </p>
                      </div>

                      <div className={`bg-slate-50 border p-5 rounded-2xl text-left space-y-4 transition-all duration-300 ${highlightBox ? 'highlight-pulse scale-105 border-blue-500 bg-blue-50/50' : 'border-slate-100'}`}>
                        {(targetPlatform === 'any' || targetPlatform === 'ios') && (
                          <div>
                            <p className="font-bold text-slate-800 text-sm flex items-center gap-2 mb-1">
                              <Apple size={16} className={highlightBox && targetPlatform === 'ios' ? 'text-blue-600' : 'text-slate-600'}/> No iPhone (Safari)
                            </p>
                            <p className="text-xs text-slate-500 leading-relaxed">
                              Toque no botão de compartilhar <span className="inline-flex border border-slate-300 rounded p-0.5 bg-white"><ArrowUp size={10}/></span> na barra inferior e escolha <strong>"Adicionar à Tela de Início"</strong>.
                            </p>
                          </div>
                        )}
                        
                        {targetPlatform === 'any' && <div className="h-px bg-slate-200 w-full"></div>}
                        
                        {(targetPlatform === 'any' || targetPlatform === 'android') && (
                          <div>
                            <p className="font-bold text-slate-800 text-sm flex items-center gap-2 mb-1">
                              <Smartphone size={16} className={highlightBox && targetPlatform === 'android' ? 'text-blue-600' : 'text-slate-600'}/> No Android (Chrome)
                            </p>
                            <p className="text-xs text-slate-500 leading-relaxed">
                              Toque nos 3 pontos verticais no canto superior direito do navegador e escolha <strong>"Adicionar à tela inicial"</strong>.
                            </p>
                          </div>
                        )}
                      </div>

                      <div className="pt-2">
                          <button onClick={() => setIsInstallModalOpen(false)} className="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-800 transition-colors flex justify-center items-center gap-2 group text-center cursor-pointer">
                            Entendi <Check size={18} className="group-hover:scale-110 transition-transform"/>
                          </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
